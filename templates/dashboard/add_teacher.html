{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-lg">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0"><i class="fas fa-chalkboard-teacher"></i> Add Teacher</h4>
        </div>
        <div class="card-body">
            <form action="{{ url_for('auth.add_teacher') }}" method="POST" enctype="multipart/form-data">
                <!-- First Name -->
                <div class="mb-3">
                    <label for="first_name" class="form-label"><i class="fas fa-user"></i> First Name</label>
                    <input type="text" class="form-control" name="first_name" placeholder="First Name" required>
                </div>
                <!-- Last Name -->
                <div class="mb-3">
                    <label for="last_name" class="form-label"><i class="fas fa-user"></i> Last Name</label>
                    <input type="text" class="form-control" name="last_name" placeholder="Last Name" required>
                </div>
                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" class="form-control" name="email" placeholder="Email" required>
                </div>
                <!-- Phone -->
                <div class="mb-3">
                    <label for="phone" class="form-label"><i class="fas fa-phone"></i> Phone</label>
                    <input type="text" class="form-control" name="phone" placeholder="Phone" required>
                </div>
                <!-- Address -->
                <div class="mb-3">
                    <label for="address" class="form-label"><i class="fas fa-map-marker-alt"></i> Address</label>
                    <input type="text" class="form-control" name="address" placeholder="Address" required>
                </div>
                <!-- Department -->
                <div class="mb-3">
                    <label for="department" class="form-label"><i class="fas fa-building"></i> Department</label>
                    <select class="form-control" name="department" required>
                        <option value="">Select Department</option>
                        <option value="CSE">Computer Science</option>
                        <option value="TT">Textile Technology</option>
                    </select>
                </div>
                <!-- Photo Upload -->
                <div class="mb-3">
                    <label for="photo" class="form-label"><i class="fas fa-camera"></i> Upload Photo</label>
                    <input type="file" class="form-control" name="photo" accept="image/*">
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus-circle"></i> Add Teacher
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
