{% extends "base.html" %}

{% block title %}Manage Student Batches{% endblock %}

{% block content %}
<div class="container">
    <h2>Manage Student Batches</h2>

    <table class="table">
        <thead>
            <tr>
                <th>Course</th>
                <th>Batch Year</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for batch in student_batches %}
            <tr>
                <td>{{ batch.course }}</td>
                <td>{{ batch.year }}</td>
                <td>
                    <a href="{{ url_for('auth.view_batch', table_name=batch.table_name) }}" class="btn btn-info btn-sm">
                        View & Edit
                    </a>
                    <form method="POST" action="{{ url_for('auth.delete_student_batch', batch_name=batch.table_name) }}" style="display:inline;">
                        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this batch?')">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
