{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <!-- Header with Manage Batches Button -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="text-primary"><i class="fas fa-user-graduate"></i> Add Student</h3>
        <a href="{{ url_for('auth.manage_batches') }}" class="btn btn-outline-primary">
            <i class="fas fa-cogs"></i> Manage Batches
        </a>
    </div>

    <div class="card shadow-lg border-0 rounded-3">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"><i class="fas fa-user-plus"></i> Student Details</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('auth.add_student') }}" enctype="multipart/form-data">
                <div class="row">
                    <!-- Course -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-book"></i> Course</label>
                        <select class="form-control" id="course_id" name="course_id" required>
                            <option value="">Select Course</option>
                            {% for course in courses %}
                            <option value="{{ course.id }}">{{ course.code }} - {{ course.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Batch Year -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-calendar-alt"></i> Batch Year</label>
                        <select class="form-control" id="admission_year" name="admission_year" required>
                            <option value="">Select Batch Year</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <!-- Semester -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-layer-group"></i> Semester</label>
                        <select class="form-control" id="semester" name="semester" required>
                            <option value="">Select Semester</option>
                        </select>
                    </div>

                    <!-- Batch ID -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-users"></i> Batch ID</label>
                        <select class="form-control" id="batch_id" name="batch_id" required>
                            <option value="">Select Batch ID</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <!-- First Name -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-user"></i> First Name</label>
                        <input type="text" class="form-control" name="first_name" placeholder="Enter first name" required>
                    </div>

                    <!-- Last Name -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-user"></i> Last Name</label>
                        <input type="text" class="form-control" name="last_name" placeholder="Enter last name" required>
                    </div>
                </div>

                <div class="row">
                    <!-- Email -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" class="form-control" name="email" placeholder="Enter email" required>
                    </div>

                    <!-- Phone -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-phone"></i> Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-control" pattern="0?[0-9]{10}" maxlength="11"
                               oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                               placeholder="Enter 10 or 11-digit phone number" required>
                    </div>
                </div>

                <div class="row">
                    <!-- Roll Number -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-id-badge"></i> Roll Number</label>
                        <input type="text" class="form-control" name="roll_number" placeholder="Enter roll number" required>
                    </div>

                    <!-- Upload Photo -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-camera"></i> Upload Photo</label>
                        <input type="file" class="form-control" name="photo" accept="image/*">
                    </div>
                </div>

                <div class="row">
                    <!-- Address -->
                    <div class="col-md-12 mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-map-marker-alt"></i> Address</label>
                        <textarea class="form-control" name="address" rows="3" placeholder="Enter student address" required></textarea>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="fas fa-user-plus"></i> Add Student
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const tableNames = JSON.parse('{{ table_names | tojson | safe }}');
        const courseDropdown = document.getElementById("course_id");
        const yearDropdown = document.getElementById("admission_year");
        const semesterDropdown = document.getElementById("semester");
        const batchDropdown = document.getElementById("batch_id");

        function extractData(keyIndex, courseId = null, batchYear = null, semester = null) {
            let values = new Set();
            tableNames.forEach(name => {
                let parts = name.split("_");
                let extractedCourse = parseInt(parts[2]);
                let extractedYear = parseInt(parts[3]);
                let extractedSemester = parseInt(parts[4]);
                let extractedBatch = parseInt(parts[5]);

                if (keyIndex === 1 && extractedCourse === parseInt(courseId)) values.add(extractedYear);
                if (keyIndex === 2 && extractedCourse === parseInt(courseId) && extractedYear === parseInt(batchYear)) values.add(extractedSemester);
                if (keyIndex === 3 && extractedCourse === parseInt(courseId) && extractedYear === parseInt(batchYear) && extractedSemester === parseInt(semester)) values.add(extractedBatch);
            });

            return Array.from(values).sort();
        }

        function updateDropdown(dropdown, options, placeholder) {
            dropdown.innerHTML = `<option value="">${placeholder}</option>`;
            options.forEach(value => {
                const option = document.createElement("option");
                option.value = value;
                option.textContent = value;
                dropdown.appendChild(option);
            });
            dropdown.disabled = options.length === 0;
        }

        courseDropdown.addEventListener("change", function () {
            let years = extractData(1, this.value);
            updateDropdown(yearDropdown, years, "Select Batch Year");
            updateDropdown(semesterDropdown, [], "Select Semester");
            updateDropdown(batchDropdown, [], "Select Batch ID");
        });

        yearDropdown.addEventListener("change", function () {
            let semesters = extractData(2, courseDropdown.value, this.value);
            updateDropdown(semesterDropdown, semesters, "Select Semester");
            updateDropdown(batchDropdown, [], "Select Batch ID");
        });

        semesterDropdown.addEventListener("change", function () {
            let batches = extractData(3, courseDropdown.value, yearDropdown.value, this.value);
            updateDropdown(batchDropdown, batches, "Select Batch ID");
        });
    });
</script>

{% endblock %}
