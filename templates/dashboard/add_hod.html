{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-5" style="background: linear-gradient(to right, #f0f0f0, #d9d9d9); min-height: 100vh;">
    <!-- Header Section with Manage HOD Button -->
    <div class="row mb-5">
        <div class="col-12 text-center position-relative">
            <h2 class="fw-bold display-4 mb-4" style="color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">
                <i class="fas fa-user-tie"></i> ADD HEAD OF DEPARTMENT
            </h2>
            <a href="{{ url_for('auth.manage_hods') }}" class="btn position-absolute"
               style="top: 0; right: 0px; background: #FF5E62; color: white; font-weight: bold; padding: 12px 24px; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: all 0.3s;">
                <i class="fas fa-cogs me-2"></i> MANAGE HOD
            </a>
        </div>
    </div>

    <div class="row">
        <div class="col-md-10 offset-md-1">
            <div class="card border-0" style="border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); transform: translateY(0); transition: all 0.3s;">
                <div class="card-header text-white text-center py-4" style="background: linear-gradient(to right, #FF5E62, #FF9966);">
                    <h4 class="mb-0 fw-bold"><i class="fas fa-user-plus me-2"></i> CREATE NEW HOD PROFILE</h4>
                </div>
                <div class="card-body p-5 bg-white">
                    <form action="{{ url_for('auth.add_hod') }}" method="POST" enctype="multipart/form-data">
                        <div class="row">
                            <!-- First Name -->
                            <div class="col-md-6 mb-4">
                                <label for="first_name" class="form-label fw-bold" style="color: #333; font-size: 1.1rem;">
                                    <i class="fas fa-user" style="color: #FF5E62;"></i> First Name
                                </label>
                                <input type="text" class="form-control form-control-lg" name="first_name" placeholder="First Name" required
                                       style="border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); padding: 12px 20px;">
                            </div>

                            <!-- Last Name -->
                            <div class="col-md-6 mb-4">
                                <label for="last_name" class="form-label fw-bold" style="color: #333; font-size: 1.1rem;">
                                    <i class="fas fa-user" style="color: #FF5E62;"></i> Last Name
                                </label>
                                <input type="text" class="form-control form-control-lg" name="last_name" placeholder="Last Name" required
                                       style="border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); padding: 12px 20px;">
                            </div>
                        </div>

                        <div class="row">
                            <!-- Email -->
                            <div class="col-md-6 mb-4">
                                <label for="email" class="form-label fw-bold" style="color: #333; font-size: 1.1rem;">
                                    <i class="fas fa-envelope" style="color: #FF5E62;"></i> Email
                                </label>
                                <input type="email" class="form-control form-control-lg" name="email" placeholder="Email" required
                                       style="border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); padding: 12px 20px;">
                            </div>

                            <!-- Phone -->
                            <div class="col-md-6 mb-4">
                                <label for="phone" class="form-label fw-bold" style="color: #333; font-size: 1.1rem;">
                                    <i class="fas fa-phone" style="color: #FF5E62;"></i> Phone
                                </label>
                                <input type="text" class="form-control form-control-lg" name="phone" pattern="[0-9]{10}"
                                       placeholder="Enter 10-digit phone number" required
                                       style="border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); padding: 12px 20px;">
                                <small class="text-muted ps-2">Format: 10-digit number (e.g., 9876543210)</small>
                            </div>
                        </div>

                        <div class="row">
                            <!-- Address -->
                            <div class="col-md-6 mb-4">
                                <label for="address" class="form-label fw-bold" style="color: #333; font-size: 1.1rem;">
                                    <i class="fas fa-map-marker-alt" style="color: #FF5E62;"></i> Address
                                </label>
                                <input type="text" class="form-control form-control-lg" name="address" placeholder="Address" required
                                       style="border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); padding: 12px 20px;">
                            </div>

                            <!-- Department -->
                            <div class="col-md-6 mb-4">
                                <label for="department" class="form-label fw-bold" style="color: #333; font-size: 1.1rem;">
                                    <i class="fas fa-building" style="color: #FF5E62;"></i> Department
                                </label>
                                <select class="form-select form-select-lg" name="department" required
                                       style="border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); padding: 12px 20px; height: auto;">
                                    <option value="">Select Department</option>
                                    <option value="CSE">Computer Science</option>
                                    <option value="TT">Textile Technology</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <!-- Office Location -->
                            <div class="col-md-6 mb-4">
                                <label for="office_location" class="form-label fw-bold" style="color: #333; font-size: 1.1rem;">
                                    <i class="fas fa-map-marker" style="color: #FF5E62;"></i> Office Location
                                </label>
                                <input type="text" class="form-control form-control-lg" name="office_location" placeholder="Office Location" required
                                       style="border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); padding: 12px 20px;">
                            </div>

                            <!-- Photo Upload -->
                            <div class="col-md-6 mb-4">
                                <label for="photo" class="form-label fw-bold" style="color: #333; font-size: 1.1rem;">
                                    <i class="fas fa-camera" style="color: #FF5E62;"></i> Upload Photo
                                </label>
                                <input type="file" class="form-control form-control-lg" name="photo" accept="image/*"
                                       style="border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); padding: 12px; height: auto;">
                            </div>
                        </div>

                        <div class="text-center mt-5">
                            <button type="submit" class="btn btn-lg px-5 py-3"
                                    style="background: linear-gradient(to right, #FF5E62, #FF9966); color: white; font-weight: bold; border-radius: 50px; box-shadow: 0 10px 20px rgba(255,94,98,0.4); transition: all 0.3s ease; font-size: 1.1rem;">
                                <i class="fas fa-plus-circle me-2"></i> ADD HEAD OF DEPARTMENT
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Hover effects */
    .btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 25px rgba(0,0,0,0.3) !important;
    }

    .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 30px 60px rgba(0,0,0,0.4) !important;
    }

    .form-control:focus, .form-select:focus {
        border-color: #FF5E62;
        box-shadow: 0 0 0 0.25rem rgba(255, 94, 98, 0.25);
    }

    /* Input field hover effect */
    .form-control:hover, .form-select:hover {
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    /* Custom animation for the form */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .card {
        animation: fadeIn 0.8s ease-out;
    }
</style>
{% endblock %}
