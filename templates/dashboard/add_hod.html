{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <!-- Manage HOD Button -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="text-primary"><i class="fas fa-user-tie"></i> Add Head of Department</h3>
        <a href="{{ url_for('auth.manage_hods') }}" class="btn btn-outline-primary">
            <i class="fas fa-cogs"></i> Manage HOD
        </a>
    </div>

    <div class="card shadow-lg border-0">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"><i class="fas fa-user-plus"></i> Add HOD</h4>
        </div>
        <div class="card-body">
            <form action="{{ url_for('auth.add_hod') }}" method="POST" enctype="multipart/form-data">
                <div class="row">
                    <!-- First Name -->
                    <div class="col-md-6 mb-3">
                        <label for="first_name" class="form-label"><i class="fas fa-user"></i> First Name</label>
                        <input type="text" class="form-control" name="first_name" placeholder="First Name" required>
                    </div>
                    <!-- Last Name -->
                    <div class="col-md-6 mb-3">
                        <label for="last_name" class="form-label"><i class="fas fa-user"></i> Last Name</label>
                        <input type="text" class="form-control" name="last_name" placeholder="Last Name" required>
                    </div>
                </div>

                <div class="row">
                    <!-- Email -->
                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" class="form-control" name="email" placeholder="Email" required>
                    </div>
                    <!-- Phone -->
                    <div class="col-md-6 mb-3">
                        <label for="phone" class="form-label"><i class="fas fa-phone"></i> Phone</label>
                        <input type="text" class="form-control" name="phone" pattern="[0-9]{10}"
                               placeholder="Enter 10-digit phone number" required>
                        <small class="text-muted">Format: 10-digit number (e.g., 9876543210)</small>
                    </div>
                </div>

                <div class="row">
                    <!-- Address -->
                    <div class="col-md-6 mb-3">
                        <label for="address" class="form-label"><i class="fas fa-map-marker-alt"></i> Address</label>
                        <input type="text" class="form-control" name="address" placeholder="Address" required>
                    </div>
                    <!-- Department -->
                    <div class="col-md-6 mb-3">
                        <label for="department" class="form-label"><i class="fas fa-building"></i> Department</label>
                        <select class="form-control" name="department" required>
                            <option value="">Select Department</option>
                            <option value="CSE">Computer Science</option>
                            <option value="TT">Textile Technology</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <!-- Office Location -->
                    <div class="col-md-6 mb-3">
                        <label for="office_location" class="form-label"><i class="fas fa-map-marker"></i> Office Location</label>
                        <input type="text" class="form-control" name="office_location" placeholder="Office Location" required>
                    </div>
                    <!-- Photo Upload -->
                    <div class="col-md-6 mb-3">
                        <label for="photo" class="form-label"><i class="fas fa-camera"></i> Upload Photo</label>
                        <input type="file" class="form-control" name="photo" accept="image/*">
                    </div>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-plus-circle"></i> Add HOD
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
