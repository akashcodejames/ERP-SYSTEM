{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="d-flex justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 fw-bold">Login</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="role" class="form-label fw-semibold">Select Role</label>
                        <select class="form-select" id="role" name="role" required onchange="toggleStudentFields(this.value)">
                            <option value="" selected disabled>Select Role</option>
                            <option value="admin">Administrator</option>
                            <option value="hod">Head of Department</option>
                            <option value="teacher">Teacher</option>
                            <option value="student">Student</option>
                        </select>
                    </div>

                    <!-- Student-specific fields (hidden by default) -->
                    <div id="studentFields" class="mb-3 d-none">
                        <label for="admission_year" class="form-label fw-semibold">Admission Year</label>
                        <select class="form-select" id="admission_year" name="admission_year">
                            <option value="2024">2024 (1st Year)</option>
                            <option value="2023">2023 (2nd Year)</option>
                            <option value="2022">2022 (3rd Year)</option>
                            <option value="2021">2021 (4th Year)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign In</button>
                </form>
            </div>
        </div>
    </div>
</div>


<script>
    function toggleStudentFields(role) {
        const studentFields = document.getElementById('studentFields');
        const yearField = document.getElementById('admission_year');

        if (role === 'student') {
            studentFields.classList.remove('d-none');
            yearField.required = true;
        } else {
            studentFields.classList.add('d-none');
            yearField.required = false;
        }
    }
</script>
{% endblock %}
